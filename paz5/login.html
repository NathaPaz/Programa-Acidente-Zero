<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAZ 5.0 — Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial, sans-serif;
  background:#0A3D6B;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card{
  background:#fff;
  width:350px;
  padding:30px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
  margin-top:0;
  color:#0A3D6B;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#0077C8;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.alerta{
  margin-bottom:12px;
  padding:10px;
  border-radius:8px;
  display:none;
}

.erro{
  background:#ffdede;
  color:#8a0000;
}

.ok{
  background:#dfffe0;
  color:#006b1b;
}
</style>
</head>
<body>

<div class="card">

  <h1>PAZ 5.0</h1>

  <div id="alerta" class="alerta"></div>

  <input
    type="email"
    id="email"
    placeholder="Seu e-mail"
  >

  <input
    type="password"
    id="senha"
    placeholder="Sua senha"
    onkeydown="if(event.key==='Enter') doLogin()"
  >

  <button id="btnLogin" onclick="doLogin()">
    Entrar
  </button>

</div>

<script>
const SUPABASE_URL = 'https://ztvsszhlniirmqdavgzu.supabase.co';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0dnNzemhsbmlpcm1xZGF2Z3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTU5MDcsImV4cCI6MjA5NDk5MTkwN30.RcR3Zv4E5_pJnzjGr-2Rspfe64QrwH1WobLhwdewnlU';

const sb = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function mostrarAlerta(msg, tipo='erro') {

  const alerta = document.getElementById('alerta');

  alerta.style.display = 'block';
  alerta.className = 'alerta ' + tipo;
  alerta.innerText = msg;
}

function esconderAlerta() {

  document.getElementById('alerta').style.display = 'none';
}

function setLoading(loading){

  const btn = document.getElementById('btnLogin');

  if(loading){
    btn.disabled = true;
    btn.innerText = 'Entrando...';
  }else{
    btn.disabled = false;
    btn.innerText = 'Entrar';
  }
}

window.doLogin = async function(){

  esconderAlerta();

  const email = document
    .getElementById('email')
    .value
    .trim()
    .toLowerCase();

  const senha = document
    .getElementById('senha')
    .value;

  if(!email || !senha){

    mostrarAlerta('Preencha e-mail e senha.');
    return;
  }

  setLoading(true);

  try{

    // LOGIN
    const { data, error } =
      await sb.auth.signInWithPassword({
        email,
        password: senha
      });

    if(error){
      throw error;
    }

    console.log('LOGIN OK', data);

    // BUSCAR PERFIL
    const { data: perfil, error: perfilErro } =
      await sb
        .from('profiles')
        .select('*')
        .eq('id', data.user.id)
        .single();

    console.log('PERFIL', perfil);

    if(perfilErro){

      console.error(perfilErro);

      mostrarAlerta(
        'Usuário autenticado, mas perfil não encontrado.'
      );

      setLoading(false);
      return;
    }

    // STATUS
    if(perfil.status === 'bloqueado'){

      await sb.auth.signOut();

      mostrarAlerta('Conta bloqueada.');
      setLoading(false);

      return;
    }

    // REDIRECIONAR
    if(
      perfil.role === 'admin' ||
      perfil.role === 'supervisor'
    ){

      window.location.href = 'admin.html';

    }else{

      window.location.href = 'index.html';
    }

  }catch(e){

    console.error(e);

    let msg = e.message || 'Erro no login';

    if(msg.includes('Invalid login credentials')){
      msg = 'E-mail ou senha inválidos';
    }

    if(msg.includes('Email not confirmed')){
      msg = 'Confirme seu e-mail';
    }

    mostrarAlerta(msg);

    setLoading(false);
  }
}
</script>

</body>
</html>
