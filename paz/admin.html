<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAZ 5.0 - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --ap: #0A3D6B; --av: #0077C8; --ci: #00B4CC; --vl: #A8CC00;
  --bg: #F0F4F8; --tx: #0A2540; --txs: #4A6785; --brd: #DDE5EF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--tx); }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.header { background: linear-gradient(135deg, var(--ap), var(--av)); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
.header h1 { font-size: 28px; margin-bottom: 5px; }
.nav { display: flex; gap: 10px; margin-bottom: 20px; }
.nav-btn { background: white; color: var(--av); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
.nav-btn.active { background: var(--av); color: white; }
.dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
.card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.card h2 { font-size: 14px; color: var(--txs); margin-bottom: 10px; text-transform: uppercase; }
.card .number { font-size: 32px; font-weight: 900; color: var(--av); }
.btn { background: linear-gradient(135deg, var(--av), var(--ap)); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; margin-right: 10px; }
.btn:hover { opacity: 0.9; }
table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--brd); }
th { background: var(--bg); font-weight: 700; color: var(--txs); }
.page { display: none; }
.page.active { display: block; }
.loading { text-align: center; padding: 40px; color: var(--txs); }
.erro { background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 15px; border-radius: 8px; margin: 20px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>PAZ 5.0 — Admin</h1>
    <p id="user-info" style="opacity: 0.9">Carregando...</p>
    <button class="btn" onclick="doLogout()" style="margin-top: 10px">Sair</button>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="showPage('usuarios')">Usuários</button>
    <button class="nav-btn" onclick="showPage('logs')">Logs</button>
  </div>

  <div id="page-dashboard" class="page active">
    <div class="loading">⏳ Carregando dashboard...</div>
  </div>

  <div id="page-usuarios" class="page">
    <div class="loading">⏳ Carregando usuários...</div>
  </div>

  <div id="page-logs" class="page">
    <div class="loading">⏳ Carregando logs...</div>
  </div>
</div>

<script>
window.showPage = function(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p)?.classList.add('active');
  event.target?.classList.add('active');
};

window.doLogout = async function() { 
  if (window.sb) await window.sb.auth.signOut(); 
  window.location.replace('/login.html'); 
};

window.cookieStorage = {
  getItem: (k) => { const n = k + "="; const c = decodeURIComponent(document.cookie).split(';'); for(let x of c) { x = x.trim(); if (x.indexOf(n) === 0) return x.substring(n.length); } return null; },
  setItem: (k, v) => { const d = new Date(); d.setTime(d.getTime() + 7*24*60*60*1000); document.cookie = k + "=" + v + ";expires=" + d.toUTCString() + ";path=/;SameSite=Lax"; },
  removeItem: (k) => { document.cookie = k + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;"; }
};
</script>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const sb = createClient(
  'https://ztvsszhlniirmqdavgzu.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0dnNzemhsbmlpcm1xZGF2Z3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTU5MDcsImV4cCI6MjA5NDk5MTkwN30.RcR3Zv4E5_pJnzjGr-2Rspfe64QrwH1WobLhwdewnlU',
  { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storage: window.cookieStorage } }
);

window.sb = sb;

sb.auth.getSession().then(async ({ data }) => {
  if (!data?.session) {
    document.getElementById('page-dashboard').innerHTML = '<div class="erro">⚠️ Sem sessão. Redirecionando...</div>';
    setTimeout(() => window.location.replace('/login.html'), 2000);
    return;
  }

  const { data: perfil } = await sb.from('profiles').select('*').eq('id', data.session.user.id).single();
  
  if (!perfil || !['admin', 'supervisor'].includes(perfil.role)) {
    document.getElementById('page-dashboard').innerHTML = '<div class="erro">⚠️ Sem permissão</div>';
    await sb.auth.signOut();
    setTimeout(() => window.location.replace('/login.html'), 2000);
    return;
  }

  document.getElementById('user-info').textContent = 'Admin: ' + perfil.nome + ' (' + perfil.role + ')';

  // Dashboard
  const { data: mots } = await sb.from('motoristas').select('count', { count: 'exact' });
  const { data: oris } = await sb.from('orientacoes').select('count', { count: 'exact' }).eq('tipo_registro', 'orientacao');
  const { data: users } = await sb.from('profiles').select('count', { count: 'exact' });

  let html = '<div class="dashboard">';
  html += '<div class="card"><h2>Motoristas</h2><div class="number">' + (mots?.length || 0) + '</div></div>';
  html += '<div class="card"><h2>Orientações</h2><div class="number">' + (oris?.length || 0) + '</div></div>';
  html += '<div class="card"><h2>Usuários</h2><div class="number">' + (users?.length || 0) + '</div></div>';
  html += '</div>';

  document.getElementById('page-dashboard').innerHTML = html;

  console.log('[PAZ5] Admin carregado OK');
}).catch(e => {
  console.error('[PAZ5] Erro:', e.message);
  document.getElementById('page-dashboard').innerHTML = '<div class="erro">❌ Erro: ' + e.message + '</div>';
});
</script>
</body>
</html>
